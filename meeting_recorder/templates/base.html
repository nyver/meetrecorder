<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Meeting Recorder{% endblock %}</title>
<style>
/* ---- Reset ---- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f0f4f8;
  color: #1a202c;
  line-height: 1.6;
  min-height: 100vh;
}
a { color: #2563eb; text-decoration: none; }
a:hover { text-decoration: underline; }
code { font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace; font-size: .85em; }

/* ---- Header ---- */
.site-header {
  background: #1e293b;
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
}
.site-logo {
  font-size: 1rem;
  font-weight: 700;
  color: #f1f5f9;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.site-logo:hover { color: #93c5fd; text-decoration: none; }
.header-dir {
  font-size: .76rem;
  color: #64748b;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ---- Page layout ---- */
.page { max-width: 1120px; margin: 0 auto; padding: 28px 20px 72px; }

/* ---- Cards ---- */
.card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 16px;
}

/* ---- Status badges ---- */
.badge {
  display: inline-block;
  font-size: .72rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
  letter-spacing: .02em;
}
.s-ready    { background: #dcfce7; color: #15803d; }
.s-partial  { background: #fef9c3; color: #a16207; }
.s-recorded { background: #dbeafe; color: #1d4ed8; }
.s-empty    { background: #f1f5f9; color: #64748b; }

/* ---- Buttons ---- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 7px 15px;
  border-radius: 8px;
  font-size: .85rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  text-decoration: none;
  transition: opacity .15s, background .15s;
  line-height: 1.3;
}
.btn:hover { opacity: .85; text-decoration: none; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-ghost   { background: transparent; color: #cbd5e1; border-color: #475569; }
.btn-ghost:hover { background: #334155; opacity: 1; }
.btn-sm { padding: 4px 11px; font-size: .78rem; }

/* ---- Sessions table ---- */
.tbl { width: 100%; border-collapse: collapse; font-size: .88rem; }
.tbl th {
  text-align: left;
  padding: 10px 16px;
  font-size: .72rem;
  font-weight: 700;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: .06em;
  border-bottom: 2px solid #e2e8f0;
  background: #f8fafc;
  white-space: nowrap;
}
.tbl th:first-child { border-radius: 12px 0 0 0; }
.tbl th:last-child  { border-radius: 0 12px 0 0; }
.tbl td { padding: 13px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tbody tr:hover td { background: #f8fafc; }
.sid-link { font-weight: 600; color: #0f172a; font-family: ui-monospace, monospace; font-size: .78rem; }
.sid-link:hover { color: #2563eb; text-decoration: none; }
.dt-main  { font-weight: 600; color: #1e293b; }
.dt-sub   { font-size: .8rem; color: #94a3b8; margin-top: 2px; }
.muted    { color: #94a3b8; font-size: .82rem; }

/* ---- Tabs ---- */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 2px solid #e2e8f0;
  margin-bottom: 20px;
}
.tab-btn {
  padding: 10px 20px;
  font-size: .88rem;
  font-weight: 600;
  color: #64748b;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  cursor: pointer;
  transition: color .15s;
  white-space: nowrap;
}
.tab-btn:hover { color: #1e293b; }
.tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ---- Markdown content ---- */
.md-content { font-size: .9rem; line-height: 1.75; }
.md-content h3 { font-size: 1.05rem; font-weight: 700; margin: 18px 0 6px; color: #0f172a; }
.md-content h4 { font-size: .95rem; font-weight: 700; margin: 14px 0 5px; color: #1e293b; }
.md-content h5 { font-size: .88rem; font-weight: 700; margin: 12px 0 4px; color: #334155; }
.md-content p  { margin-bottom: 10px; }
.md-content ul { margin: 4px 0 10px 22px; }
.md-content li { margin-bottom: 4px; }
.md-content hr { border: none; border-top: 1px solid #e2e8f0; margin: 16px 0; }
.md-content strong { font-weight: 700; }
.md-content em { font-style: italic; }

/* md-table (inside summary rendering) */
.md-table { border-collapse: collapse; width: 100%; font-size: .83rem; margin: 10px 0; }
.md-table th, .md-table td { border: 1px solid #e2e8f0; padding: 6px 12px; text-align: left; vertical-align: top; }
.md-table th { background: #f8fafc; font-weight: 700; }
.md-table tr:nth-child(even) td { background: #f8fafc; }

/* ---- Media player ---- */
.player-wrap {
  background: #0f172a;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
}
.player-wrap video { width: 100%; display: block; max-height: 420px; }
.player-wrap audio { width: 100%; display: block; padding: 14px 16px; background: #1e293b; }

/* ---- Transcript ---- */
.transcript-list { display: flex; flex-direction: column; gap: 1px; }
.seg {
  display: grid;
  grid-template-columns: 50px 140px 1fr;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 7px;
  cursor: pointer;
  transition: background .1s;
  align-items: baseline;
}
.seg:hover { background: #eff6ff; }
.seg.active { background: #eff6ff; box-shadow: inset 3px 0 0 #2563eb; }
.seg .ts {
  color: #94a3b8;
  font-size: .74rem;
  font-variant-numeric: tabular-nums;
  font-family: ui-monospace, monospace;
  text-decoration: underline dotted;
  white-space: nowrap;
}
.seg .sp {
  font-weight: 700;
  font-size: .79rem;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.seg .tx { font-size: .87rem; color: #374151; line-height: 1.5; }

/* ---- Empty state ---- */
.empty-state {
  text-align: center;
  padding: 52px 20px;
  color: #94a3b8;
}
.empty-state .icon { font-size: 2.8rem; margin-bottom: 14px; }
.empty-state p { font-size: .92rem; margin-bottom: 6px; }

{% block extra_css %}{% endblock %}
</style>
</head>
<body>
<header class="site-header">
  <a class="site-logo" href="/">🎙 Meeting Recorder</a>
  {% block header_extra %}{% endblock %}
</header>
<div class="page">
  {% block content %}{% endblock %}
</div>
</body>
</html>
