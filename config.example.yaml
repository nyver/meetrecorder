# Meeting Recorder — пример конфигурации
# Скопируйте в config.yaml и отредактируйте перед использованием.
# Чувствительные значения можно задать через переменные окружения:
#   HF_TOKEN     — токен HuggingFace для pyannote (диаризация)
#   LLM_API_KEY  — API-ключ LLM (для backend: openrouter)

# Папка для сохранения записей и артефактов
output_dir: "C:/Meetings"

# ---------------------------------------------------------------------------
# Запись экрана и звука
# ---------------------------------------------------------------------------
recording:
  # Частота кадров видео
  fps: 20

  # Кодек видео (libx264 — универсальный)
  video_codec: "libx264"

  # Частота дискретизации аудио (Гц)
  audio_sample_rate: 48000

  # Имя микрофона (dshow-имя устройства). Найти список:
  #   ffmpeg -list_devices true -f dshow -i dummy 2>&1 | grep "(audio)"
  mic_device: "Microphone (Realtek High Definition Audio)"

  # Захват системного звука:
  #   soundcard  — WASAPI loopback через Python (рекомендуется, не требует
  #                спецсборки ffmpeg)
  #   wasapi     — через ffmpeg WASAPI (нужна сборка с поддержкой WASAPI)
  #   dshow      — через виртуальное устройство (Stereo Mix / VB-Cable)
  system_audio_grabber: "soundcard"

  # Имя loopback-устройства (только для system_audio_grabber: dshow или wasapi)
  system_audio_device: "Stereo Mix (Realtek High Definition Audio)"

  # true — записывать системный звук, false — только микрофон
  record_system_audio: true

  # Захват экрана:
  #   ddagrab  — через DXGI Desktop Duplication (быстрее, требует ffmpeg >= 6.1)
  #   gdigrab  — GDI-захват (совместимее, но медленнее; не захватывает UAC/DRM)
  screen_grabber: "gdigrab"

# ---------------------------------------------------------------------------
# Транскрипция и диаризация (WhisperX + pyannote)
# ---------------------------------------------------------------------------
transcription:
  # Модель Whisper:
  #   large-v3-turbo  — в 6-8x быстрее large-v3, WER для русского хуже <2%
  #                     (рекомендуется для GPU)
  #   large-v3        — максимальное качество
  #   medium          — компромисс, приемлем на CPU
  model: "large-v3-turbo"

  # Язык аудио (ru, en, de, … — или auto для автоопределения)
  language: "ru"

  # true — включить диаризацию (определение говорящих через pyannote)
  diarization: true

  # Устройство инференса: cuda (GPU NVIDIA) или cpu
  device: "cuda"

  # beam_size=1 (greedy) в ~3-4x быстрее beam_size=5 при минимальной потере точности
  beam_size: 1

  # batch_size=0 → авто (16 на cuda, без батчинга на cpu).
  # BatchedInferencePipeline даёт 3-5x ускорение на GPU.
  batch_size: 0

  # Токен HuggingFace для загрузки pyannote (диаризация).
  # Получить: https://huggingface.co/settings/tokens
  # Принять лицензии: pyannote/speaker-diarization-3.1, pyannote/segmentation-3.0
  # Можно оставить пустым и задать через переменную окружения HF_TOKEN.
  hf_token: ""

  # Псевдонимы говорящих: SPEAKER_00 → реальное имя.
  # Оставьте пустым или добавьте столько записей, сколько участников.
  speaker_names:
    SPEAKER_00: "Иван"
    SPEAKER_01: "Мария"
    SPEAKER_02: "Алексей"

# ---------------------------------------------------------------------------
# LLM — генерация summary, ключевых моментов (highlights), чат по встрече
# ---------------------------------------------------------------------------
llm:
  # Бэкенд:
  #   local       — llama-server на вашем ПК (данные не покидают машину)
  #   openrouter  — облако OpenRouter (транскрипт отправляется во внешний сервис)
  backend: "local"

  # URL OpenAI-совместимого API
  base_url: "http://127.0.0.1:8080/v1"
  # base_url: "https://openrouter.ai/api/v1"

  # Идентификатор модели (алиас llama-server или название модели на OpenRouter)
  model: "my-model-alias"
  # model: "openai/gpt-4o-mini"
  # model: "anthropic/claude-3.5-haiku"
  # model: "deepseek/deepseek-r1"

  # API-ключ (для OpenRouter обязателен; для локального сервера не нужен).
  # Рекомендуется задать через переменную окружения LLM_API_KEY.
  # api_key: "sk-or-xxxxxxxxxxxxxxxxxxxx"

  # Температура генерации (0.0 – детерминировано, 1.0 – творчески)
  temperature: 0.3

  # Максимальное число токенов в ответе LLM.
  # Для thinking-моделей (DeepSeek-R1 и аналогов) рекомендуется >= 16384.
  max_tokens: 16384

  # true — дополнительно отшлифовать markdown-протокол через LLM
  clean_protocol: false

  # Таймаут одного запроса к LLM (секунды).
  # Увеличьте до 600+ для больших транскриптов на медленном GPU.
  timeout: 600
